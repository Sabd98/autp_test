services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: autp_app
    restart: unless-stopped
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_KEY=${APP_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - SESSION_DRIVER=file
      - QUEUE_CONNECTION=sync
      - CACHE_STORE=file
    networks:
      - autp-network
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    container_name: autp_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - autp-network

  nginx:
    image: nginx:alpine
    container_name: autp_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/var/www/html/public:ro
    networks:
      - autp-network
    depends_on:
      - app

volumes:
  db_data:

networks:
  autp-network:
    driver: bridge
